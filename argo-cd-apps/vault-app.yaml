apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
name: vault-gitops
namespace: argocd
spec:
project: default
source:
repoURL: 'https://github.com/Nematullo/DevOps_Case.git'
targetRevision: HEAD
path: vault
helm:
valueFiles:
- neo_values.yaml
destination:
server: 'https://kubernetes.default.svc'
namespace: vault
syncPolicy:
automated:
prune: true
selfHeal: true
syncOptions:
- CreateNamespace=true